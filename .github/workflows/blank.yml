name: CloudForge
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  runner:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
        Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "CloudForge@2024" -Force)

    - name: Download & Install Ngrok
      run: |
        Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
        Expand-Archive ngrok.zip -DestinationPath .\ngrok_dir
        Move-Item .\ngrok_dir\ngrok.exe .\ngrok.exe

    - name: Custom Script
      run: |
        

    - name: Start Ngrok & Get IP
      run: |
        $ngrokConf = "version: 2`nauthtoken: 3AZiU7SAZhZH9lefuJxHx5if6v9_4omJcz1WGaC9RJPFEtYb7`nregion: ap`ntunnels:`n  rdp:`n    proto: tcp`n    addr: 3389"
        Set-Content -Path "ngrok.yml" -Value $ngrokConf
        taskkill /f /im ngrok.exe 2>$null
        Start-Process -FilePath ".\ngrok.exe" -ArgumentList "start --all --config .\ngrok.yml"
        Start-Sleep -Seconds 10
        try {
          $r = Invoke-RestMethod http://localhost:4040/api/tunnels
          $t = $r.tunnels | Where-Object { $_.proto -eq 'tcp' } | Select-Object -First 1
          if ($t) {
            $url = $t.public_url -replace "tcp://", ""
            $url | Out-File -FilePath ip.txt -Encoding utf8
            git config --global user.email "cf@bot"
            git config --global user.name "CloudForge"
            git add ip.txt
            git commit -m "tunnel: $url"
            git push
          }
        } catch {}
        Start-Sleep -Seconds 21600
